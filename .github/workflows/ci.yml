# SPDX-License-Identifier: MPL-2.0
name: CI/CD Pipeline
on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]
permissions:
  contents: read
jobs:
  # RSR Compliance Check
  rsr-compliance:
    name: RSR Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - name: Check RSR Compliance
        run: node scripts/check-rsr-compliance.js
  # Lint and Format
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint --workspaces --if-present
        continue-on-error: true
      - name: Check formatting
        run: npx prettier --check "**/*.{js,ts,tsx,json,md,yml,yaml}"
        continue-on-error: true
  # TypeScript Type Checking
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck --workspaces --if-present
        continue-on-error: true
  # Build All Packages
  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build packages
        run: npm run build --workspaces
        continue-on-error: true
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            tools/*/dist
          retention-days: 7
        continue-on-error: true
  # Test Suite
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --workspaces --if-present
        continue-on-error: true
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
        continue-on-error: true
  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true
  # Docker Build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6df267d1d40129fc4270f28032d0 # v3.10.0
      - name: Build Docker images
        run: docker-compose build
        continue-on-error: true
  # Accessibility Tests
  a11y:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run accessibility tests
        run: npm run test:a11y --workspaces --if-present
        continue-on-error: true
  # Summary
  deno-test:
    name: Deno Tests (E2E / Property / Aspect)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4.1.1
      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.x
      - name: Run CLI tests
        run: deno test --allow-net --allow-read --allow-env --allow-run tools/cli/tests/
      - name: Run monitoring-api E2E tests
        run: deno test --allow-net --allow-read --allow-env tools/monitoring-api/tests/e2e/
      - name: Run monitoring-api property tests
        run: deno test --allow-net --allow-read --allow-env tools/monitoring-api/tests/property/
      - name: Run monitoring-api security tests
        run: deno test --allow-net --allow-read --allow-env tools/monitoring-api/tests/aspect/
  ci-summary:
    name: CI Summary
    needs: [rsr-compliance, lint, typecheck, build, test, security, docker, a11y, deno-test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()
    steps:
      - name: Check job statuses
        run: |-
          echo "RSR Compliance: ${{ needs.rsr-compliance.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "TypeCheck: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "Accessibility: ${{ needs.a11y.result }}"
          echo "Deno Tests: ${{ needs.deno-test.result }}"
